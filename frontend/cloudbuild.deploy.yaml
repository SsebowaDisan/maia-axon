substitutions:
  _IMAGE: ""
  _NEXT_PUBLIC_API_URL: ""
  _NEXT_PUBLIC_WS_URL: ""

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg
      - NEXT_PUBLIC_API_URL=${_NEXT_PUBLIC_API_URL}
      - --build-arg
      - NEXT_PUBLIC_WS_URL=${_NEXT_PUBLIC_WS_URL}
      - -t
      - ${_IMAGE}
      - .

images:
  - ${_IMAGE}
